services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: always
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    command: server ${MINIO_DATA_DIR:?MINIO_DATA_DIR is required in .env} --console-address ":${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required in .env}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in .env}
    ports:
      - "0.0.0.0:${MINIO_API_PORT:?MINIO_API_PORT is required in .env}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required in .env}:9001"
    volumes:
      - minio_data:${MINIO_DATA_DIR:?MINIO_DATA_DIR is required in .env}

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
    ports:
      - "4000:4000"
    depends_on:
      - db
      - minio

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
