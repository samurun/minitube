services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file:
      - ./.env
    command: server ${MINIO_DATA_DIR:?MINIO_DATA_DIR is required in .env} --console-address ":${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required in .env}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in .env}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "0.0.0.0:${MINIO_API_PORT:?MINIO_API_PORT is required in .env}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required in .env}:9001"
    volumes:
      - minio_data:${MINIO_DATA_DIR:?MINIO_DATA_DIR is required in .env}

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
    ports:
      - "4000:4000"
    # Cap CPU so request handling (uploads especially) can't starve the host.
    cpus: 1.5
    mem_limit: 1g
    # oven/bun:1-alpine doesn't ship curl, so use bun itself for the probe —
    # zero extra image size, always present (it's the runtime).
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 10
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
             docker-entrypoint.sh rabbitmq-server"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: web
    restart: unless-stopped
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker-thumbnail:
    build:
      context: .
      dockerfile: docker/worker-thumbnail.Dockerfile
    container_name: worker-thumbnail
    restart: unless-stopped
    env_file:
      - ./.env
    cpus: 0.5
    mem_limit: 512m
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  worker-preview:
    build:
      context: .
      dockerfile: docker/worker-preview.Dockerfile
    container_name: worker-preview
    restart: unless-stopped
    env_file:
      - ./.env
    cpus: 1.5
    mem_limit: 1g
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  worker-transcode:
    build:
      context: .
      dockerfile: docker/worker-transcode.Dockerfile
    container_name: worker-transcode
    restart: unless-stopped
    env_file:
      - ./.env
    cpus: 2.0
    mem_limit: 2g
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - node-exporter
      - postgres-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - db

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
